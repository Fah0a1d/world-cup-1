<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>بطولة التوقعات - محفوظة</title>

<style>
body{
font-family:Tahoma;
background:#0b5d3b;
color:white;
text-align:center;
}

.box{
background:white;
color:black;
margin:15px auto;
padding:15px;
width:90%;
max-width:700px;
border-radius:12px;
}

input, select{
padding:8px;
margin:5px;
width:90%;
}

button{
background:green;
color:white;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

table{
width:100%;
margin-top:10px;
border-collapse:collapse;
}

td, th{
border:1px solid #ccc;
padding:8px;
}
</style>
</head>

<body>

<h1>🏆 بطولة التوقعات (حفظ تلقائي)</h1>

<div class="box">

<h3>اسم اللاعب</h3>
<input id="name" placeholder="اكتب اسمك">

<h3>التوقعات</h3>

<p>🇧🇷 البرازيل × 🇯🇵 اليابان</p>
<select id="m1">
<option value="brazil">البرازيل</option>
<option value="japan">اليابان</option>
</select>

<p>🇫🇷 فرنسا × 🇪🇸 إسبانيا</p>
<select id="m2">
<option value="france">فرنسا</option>
<option value="spain">إسبانيا</option>
</select>

<p>🇦🇷 الأرجنتين × 🇳🇱 هولندا</p>
<select id="m3">
<option value="argentina">الأرجنتين</option>
<option value="netherlands">هولندا</option>
</select>

<p>🏴 إنجلترا × 🇸🇳 السنغال</p>
<select id="m4">
<option value="england">إنجلترا</option>
<option value="senegal">السنغال</option>
</select>

<p>🇲🇦 المغرب × 🇵🇹 البرتغال</p>
<select id="m5">
<option value="morocco">المغرب</option>
<option value="portugal">البرتغال</option>
</select>

<button onclick="submitPrediction()">تسجيل التوقع</button>

</div>

<div class="box">
<h2>🏆 جدول الترتيب</h2>

<table>
<thead>
<tr>
<th>الاسم</th>
<th>النقاط</th>
</tr>
</thead>
<tbody id="board"></tbody>
</table>

</div>

<script>

// النتائج (تعدلها أنت كل ما انتهت مباراة)
let results = {
m1:"brazil",
m2:"france",
m3:"argentina",
m4:"england",
m5:"morocco"
};

// تحميل البيانات من التخزين
let leaderboard = JSON.parse(localStorage.getItem("board")) || [];

renderBoard();

function submitPrediction(){

let name = document.getElementById("name").value;
if(name===""){
alert("اكتب اسمك");
return;
}

let score = 0;

// حساب النقاط
if(document.getElementById("m1").value === results.m1) score++;
if(document.getElementById("m2").value === results.m2) score++;
if(document.getElementById("m3").value === results.m3) score++;
if(document.getElementById("m4").value === results.m4) score++;
if(document.getElementById("m5").value === results.m5) score++;

// لو اللاعب موجود نحدّثه
let existing = leaderboard.find(p => p.name === name);

if(existing){
existing.score += score;
}else{
leaderboard.push({name:name, score:score});
}

// حفظ دائم
localStorage.setItem("board", JSON.stringify(leaderboard));

renderBoard();

}

function renderBoard(){

leaderboard.sort((a,b)=>b.score-a.score);

let table = document.getElementById("board");
table.innerHTML = "";

leaderboard.forEach(p=>{
table.innerHTML += `
<tr>
<td>${p.name}</td>
<td>${p.score}</td>
</tr>
`;
});

}

</script>

</body>
</html>
