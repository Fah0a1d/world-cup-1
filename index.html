<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>بطولة التوقعات - نظام النقاط</title>

<style>
body{
font-family:Tahoma;
background:#0b5d3b;
color:white;
text-align:center;
}

.box{
background:white;
color:black;
margin:20px auto;
padding:15px;
width:90%;
max-width:600px;
border-radius:12px;
}

input, select{
padding:8px;
margin:5px;
width:80%;
}

button{
background:green;
color:white;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

.result{
margin-top:10px;
font-weight:bold;
}
</style>
</head>

<body>

<h1>🏆 نظام التوقعات بالنقاط</h1>

<div class="box">
<h3>اسم اللاعب</h3>
<input id="player" placeholder="اكتب اسمك">
</div>

<div class="box">
<h3>🇧🇷 البرازيل × 🇯🇵 اليابان</h3>

<select id="team">
<option value="brazil">البرازيل</option>
<option value="japan">اليابان</option>
</select>

<br>

<input id="score" placeholder="النتيجة (مثال 2-1)">

<button onclick="predict()">توقع</button>

<div id="out" class="result"></div>
</div>

<div class="box">
<h3>النقاط</h3>
<div id="points">0</div>
</div>

<script>

let points = 0;

// النتيجة الصحيحة (مؤقتًا)
let correctWinner = "brazil";
let correctScore = "2-1";

function predict(){

let name = document.getElementById("player").value;
let team = document.getElementById("team").value;
let score = document.getElementById("score").value;

if(name === ""){
alert("اكتب اسمك");
return;
}

let msg = "";
let add = 0;

// فحص الفائز
if(team === correctWinner){
add += 1;
msg += "✔ الفائز صحيح +1\n";
}

// فحص النتيجة
if(score === correctScore){
add += 3;
msg += "🔥 النتيجة صحيحة +3";
}

points += add;

document.getElementById("points").innerHTML = points;
document.getElementById("out").innerText = msg;

}

</script>

</body>
</html>
