<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>بطولة التوقعات - لوحة تحكم</title>

<style>
body{
font-family:Tahoma;
margin:0;
background:linear-gradient(135deg,#e8f5e9,#bbdefb);
color:#222;
text-align:center;
}

h1{
background:#0b5d3b;
color:white;
margin:0;
padding:15px;
}

.box{
background:white;
margin:15px auto;
padding:15px;
width:90%;
max-width:750px;
border-radius:12px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

input, select{
padding:10px;
margin:5px;
width:90%;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#0b8f52;
color:white;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
margin:5px;
}

.admin{
background:#ff9800;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

td, th{
border:1px solid #ddd;
padding:8px;
}
</style>
</head>

<body>

<h1>🏆 بطولة التوقعات (نظام نقاط احترافي)</h1>

<!-- 👤 اللاعب -->
<div class="box">
<h3>اسم اللاعب</h3>
<input id="name" placeholder="اكتب اسمك">
</div>

<!-- 🎮 التوقع -->
<div class="box">

<h3 id="matchTitle">🇧🇷 البرازيل × 🇵🇹 البرتغال</h3>

<select id="pick">
<option value="brazil">البرازيل</option>
<option value="portugal">البرتغال</option>
</select>

<input id="scoreGuess" placeholder="النتيجة (مثال 2-1)">

<button onclick="submitGuess()">تسجيل التوقع</button>

</div>

<!-- 🛠 لوحة التحكم -->
<div class="box">
<h3>🛠 لوحة التحكم (أنت فقط)</h3>

<input id="realScore" placeholder="النتيجة الفعلية (مثال 2-1)">

<select id="realWinner">
<option value="brazil">البرازيل</option>
<option value="portugal">البرتغال</option>
</select>

<button class="admin" onclick="setResult()">إنهاء المباراة + احتساب النقاط</button>
<button class="admin" onclick="nextMatch()">تغيير المباراة</button>
</div>

<!-- 🏆 الترتيب -->
<div class="box">
<h3>🏆 جدول الترتيب</h3>
<table>
<thead>
<tr>
<th>الاسم</th>
<th>النقاط</th>
</tr>
</thead>
<tbody id="board"></tbody>
</table>
</div>

<script>

let leaderboard = JSON.parse(localStorage.getItem("board")) || [];

// المباراة الحالية
let match = {
title: "🇧🇷 البرازيل × 🇵🇹 البرتغال",
winner: "portugal",
score: "2-1"
};

let predictions = []; // تخزين توقعات اللاعبين

document.getElementById("matchTitle").innerText = match.title;

// تسجيل توقع اللاعب
function submitGuess(){

let name = document.getElementById("name").value;
if(name===""){
alert("اكتب اسمك");
return;
}

predictions.push({
name:name,
pick:document.getElementById("pick").value,
score:document.getElementById("scoreGuess").value
});

alert("تم تسجيل توقعك ✔");

}

// إنهاء المباراة + حساب النقاط
function setResult(){

let realScore = document.getElementById("realScore").value;
let realWinner = document.getElementById("realWinner").value;

if(realScore===""){
alert("اكتب النتيجة");
return;
}

// حساب النقاط
predictions.forEach(p=>{

let points = 0;

// فائز صحيح
if(p.pick === realWinner){
points += 1;
}

// نتيجة صحيحة
if(p.score === realScore){
points += 2; // +1 إضافية = يصبح المجموع 3
}

let user = leaderboard.find(x=>x.name===p.name);

if(user){
user.points += points;
}else{
leaderboard.push({name:p.name, points:points});
}

});

localStorage.setItem("board", JSON.stringify(leaderboard));

predictions = [];

render();

alert("تم إنهاء المباراة واحتساب النقاط ✔");

}

// تغيير المباراة
function nextMatch(){

let title = prompt("اكتب المباراة الجديدة (مثال: المغرب × إسبانيا)");
let win = prompt("مين الفائز الافتراضي؟ (اكتب الاسم الإنجليزي مثل spain)");
let score = prompt("النتيجة الصحيحة (مثال 2-0)");

if(title){
match.title = title;
match.winner = win;
match.score = score;

document.getElementById("matchTitle").innerText = title;
}
}

// عرض الترتيب
function render(){

leaderboard.sort((a,b)=>b.points-a.points);

let table = document.getElementById("board");
table.innerHTML = "";

leaderboard.forEach(p=>{
table.innerHTML += `
<tr>
<td>${p.name}</td>
<td>${p.points}</td>
</tr>
`;
});

}

render();

</script>

</body>
</html>
