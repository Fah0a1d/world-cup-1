<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>بطولة التوقعات</title>

<style>
body{
font-family:Tahoma;
margin:0;
background:linear-gradient(135deg,#e8f5e9,#bbdefb);
color:#222;
text-align:center;
}

h1{
background:#0b5d3b;
color:white;
margin:0;
padding:20px;
}

.box{
background:white;
margin:15px auto;
padding:15px;
width:90%;
max-width:700px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input, select{
padding:10px;
margin:5px;
width:90%;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#0b8f52;
color:white;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

table{
width:100%;
margin-top:10px;
border-collapse:collapse;
}

td, th{
border:1px solid #ddd;
padding:8px;
}

.winner{
color:green;
font-weight:bold;
}
</style>
</head>

<body>

<h1>🏆 بطولة توقعات كأس العالم</h1>

<div class="box">

<h3>اسم اللاعب</h3>
<input id="name" placeholder="اكتب اسمك">

<h3>🇧🇷 البرازيل × 🇵🇹 البرتغال</h3>

<select id="team">
<option value="brazil">البرازيل</option>
<option value="portugal">البرتغال</option>
</select>

<input id="score" placeholder="النتيجة (مثال 3-1)">

<button onclick="predict()">تسجيل التوقع</button>

<div id="result"></div>

</div>

<div class="box">
<h2>🏆 جدول الترتيب</h2>

<table>
<thead>
<tr>
<th>الاسم</th>
<th>النقاط</th>
<th>الفائز المتوقع</th>
</tr>
</thead>
<tbody id="board"></tbody>
</table>
</div>

<script>

let leaderboard = JSON.parse(localStorage.getItem("board")) || [];

// النتيجة الحقيقية (تعدلها أنت)
let correctWinner = "portugal";
let correctScore = "3-1";

function predict(){

let name = document.getElementById("name").value;
let team = document.getElementById("team").value;
let score = document.getElementById("score").value;

if(name === ""){
alert("اكتب اسمك");
return;
}

let points = 0;
let winnerText = "";

// تحويل النتيجة للفائز
let parts = score.split("-");
let userWinner = "";

if(parseInt(parts[0]) > parseInt(parts[1])){
userWinner = team;
}else{
userWinner = (team === "brazil") ? "portugal" : "brazil";
}

// حساب النقاط
if(userWinner === correctWinner){
points += 1;
}

if(score === correctScore){
points += 3;
}

let existing = leaderboard.find(p => p.name === name);

if(existing){
existing.points += points;
existing.winner = userWinner;
}else{
leaderboard.push({
name:name,
points:points,
winner:userWinner
});
}

localStorage.setItem("board", JSON.stringify(leaderboard));

render();

document.getElementById("result").innerHTML =
"✔ تم التسجيل - الفائز المتوقع: <b>" + userWinner + "</b>";

}

function render(){

leaderboard.sort((a,b)=>b.points-a.points);

let table = document.getElementById("board");
table.innerHTML = "";

leaderboard.forEach(p=>{
table.innerHTML += `
<tr>
<td>${p.name}</td>
<td>${p.points}</td>
<td class="winner">${p.winner}</td>
</tr>
`;
});

}

render();

</script>

</body>
</html>
