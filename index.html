<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>بطولة التوقعات</title>

<style>
body{
font-family:Tahoma;
background:#0b5d3b;
color:white;
text-align:center;
}

.box{
background:white;
color:black;
margin:20px auto;
padding:15px;
width:90%;
max-width:600px;
border-radius:12px;
}

button{
background:green;
color:white;
padding:10px;
border:none;
border-radius:8px;
margin-top:10px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>🏆 نظام التوقعات والنقاط</h1>

<div class="box">
<h3>سجل اسمك</h3>
<input id="playerName" placeholder="اسمك">
<button onclick="saveName()">دخول</button>
</div>

<div class="box">
<h3>المباراة: البرازيل × اليابان</h3>

<select id="pred">
<option value="brazil">البرازيل</option>
<option value="japan">اليابان</option>
</select>

<button onclick="addPrediction()">توقع</button>

<div id="msg"></div>
</div>

<div class="box">
<h3>النقاط</h3>
<div id="score">0</div>
</div>

<script>

let score = 0;
let player = "";

function saveName(){
player = document.getElementById("playerName").value;
alert("مرحبًا " + player);
}

function addPrediction(){
if(player === ""){
alert("اكتب اسمك أول");
return;
}

let pick = document.getElementById("pred").value;

// هنا لاحقًا نحط نتيجة حقيقية
let correct = "brazil";

if(pick === correct){
score += 1;
document.getElementById("msg").innerHTML = "✔ توقع صحيح +1";
}else{
document.getElementById("msg").innerHTML = "❌ خطأ";
}

document.getElementById("score").innerHTML = score;
}

</script>

</body>
</html>
